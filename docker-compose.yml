version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: codearena_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codearena}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codearena_secret}
      POSTGRES_DB: ${POSTGRES_DB:-codearena}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codearena"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: codearena_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-server:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    container_name: codearena_api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-codearena}:${POSTGRES_PASSWORD:-codearena_secret}@postgres:5432/${POSTGRES_DB:-codearena}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super_secret_refresh_key_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api-server:/app
      - /app/node_modules
    command: npm run dev

  worker:
    build:
      context: ./worker-service
      dockerfile: Dockerfile
    container_name: codearena_worker
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-codearena}:${POSTGRES_PASSWORD:-codearena_secret}@postgres:5432/${POSTGRES_DB:-codearena}
      REDIS_URL: redis://redis:6379
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      SANDBOX_NETWORK: none
      CODE_TIMEOUT_MS: ${CODE_TIMEOUT_MS:-10000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./worker-service:/app
      - /app/node_modules
      - /tmp/codearena:/tmp/codearena
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codearena_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
      VITE_WS_URL: ${VITE_WS_URL:-http://localhost:4000}
      VITE_API_PROXY_TARGET: http://api-server:4000
    depends_on:
      - api-server
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
  redis_data:
